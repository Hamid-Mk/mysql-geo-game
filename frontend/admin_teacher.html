<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SQL Atlas — Teacher Portal</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-admin">

  <div id="tsparticles" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></div>

  <header class="glass-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🌍</span>
        <span class="logo-text">SQL Atlas</span>
      </a>
      <span class="admin-badge">Teacher Portal</span>
    </div>
  </header>

  <main class="admin-main">

    <!-- LOGIN FORM -->
    <section id="login-section" class="admin-card login-card fade-in-up">
      <div class="login-icon drop-bounce">🔐</div>
      <h1 class="admin-title text-gradient">Teacher Login</h1>
      <p class="admin-sub">Enter the master passphrase to access the curriculum.</p>

      <div class="form-group">
        <label for="password-input" class="form-label">Passphrase</label>
        <input
          type="password"
          id="password-input"
          class="form-input"
          placeholder="Enter teacher password"
          autocomplete="current-password"
        />
        <span id="login-error" class="field-error text-error" style="display:none; color: var(--error); margin-top: 0.5rem; font-weight: bold; display: block;">
          ❌ Incorrect password.
        </span>
      </div>

      <button id="btn-login" class="btn-primary btn-full">Access Portal ➔</button>
      <p class="login-hint text-muted" style="margin-top: 1rem;">
        <small>Hint: The password is set in the backend <code>.env</code> file.</small>
      </p>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard-section" class="dashboard-section fade-in-up delay-1" style="display:none;">
      <div class="admin-card" style="margin-bottom: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h1 class="admin-title text-gradient" style="margin: 0;">Welcome, Teacher! 👋</h1>
          <button id="btn-logout" class="btn-ghost-glow">Logout</button>
        </div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="add-challenge">➕ Create Quest</button>
        <button class="tab-btn" data-tab="view-challenges">📋 View All Quests</button>
      </div>

      <!-- Tab: Add Challenge -->
      <div id="tab-add-challenge" class="tab-panel admin-card">
        <h2 class="admin-title text-gradient" style="font-size: 1.8rem;">Forge a New Quest</h2>

        <div class="form-group">
          <label for="input-question" class="form-label">Quest Objective *</label>
          <textarea id="input-question" class="form-input form-textarea" rows="2" placeholder="e.g. Find all cities in Japan."></textarea>
        </div>

        <div class="form-group">
          <label for="input-expected-sql" class="form-label">Expected SQL Solution *</label>
          <textarea id="input-expected-sql" class="form-input form-textarea sql-editor custom-scrollbar" rows="3" placeholder="SELECT * FROM cities..."></textarea>
        </div>

        <div class="form-group">
          <label for="input-category" class="form-label">Category *</label>
          <select id="input-category" class="form-input form-select">
            <option value="">— Select category —</option>
            <option value="Absolute Beginner">Absolute Beginner</option>
            <option value="WHERE + Scalar Functions">WHERE + Scalar Functions</option>
            <option value="Joins">Joins</option>
            <option value="Subqueries">Subqueries</option>
            <option value="Set Functions">Set Functions</option>
            <option value="Correlated Subqueries">Correlated Subqueries</option>
            <option value="Group By">Group By</option>
          </select>
        </div>

        <div class="form-group">
          <label for="input-difficulty" class="form-label">Difficulty *</label>
          <select id="input-difficulty" class="form-input form-select">
            <option value="">— Select difficulty —</option>
            <option value="easy">🟢 Easy</option>
            <option value="medium">🟡 Medium</option>
            <option value="hard">🔴 Hard</option>
          </select>
        </div>

        <div class="form-group">
          <label for="input-hint" class="form-label">Hint (optional)</label>
          <input type="text" id="input-hint" class="form-input" placeholder="e.g. Use an INNER JOIN..."/>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button id="btn-save-challenge" class="btn-primary">💾 Forge Quest</button>
          <button id="btn-clear-form" class="btn-ghost-glow">Clear</button>
        </div>
        <div id="save-feedback" class="save-feedback text-muted" style="margin-top: 1rem; display:none;"></div>
      </div>

      <!-- Tab: View Challenges -->
      <div id="tab-view-challenges" class="tab-panel admin-card" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h2 class="admin-title text-gradient" style="font-size: 1.8rem; margin: 0;">All Quests</h2>
          <div style="display: flex; gap: 1rem; align-items: center;">
            <select id="filter-difficulty" class="form-input form-select" style="padding: 0.5rem 1rem; width: auto;">
              <option value="">All Difficulties</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button id="btn-refresh-challenges" class="btn-ghost-glow">🔄 Refresh</button>
          </div>
        </div>
        <div id="challenges-list" class="challenges-list custom-scrollbar">
          <p class="text-muted">Loading quests...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
