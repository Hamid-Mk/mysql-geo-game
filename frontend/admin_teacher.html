<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Atlas — Teacher Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-admin">
  <div class="space-grid admin-grid" aria-hidden="true"></div>
  <header class="app-header admin-header">
    <a class="brand-lockup" href="index.html">
      <img src="assets/sql-atlas-logo.svg" alt="" class="brand-mark">
      <span class="brand-text">SQL Atlas</span>
    </a>
    <nav class="header-actions">
      <a class="nav-link" href="index.html">Student Dashboard</a>
      <span class="teacher-badge">Teacher Portal</span>
    </nav>
  </header>

  <main class="admin-shell">
    <section id="login-section" class="teacher-panel narrow">
      <p class="eyebrow admin-eyebrow">Instructor access</p>
      <h1>Teacher Portal</h1>
      <p class="hero-copy">Create questions and review the SQL Atlas challenge library.</p>
      <label for="password-input">Password</label>
      <input id="password-input" type="password" autocomplete="current-password" placeholder="Teacher password">
      <p id="login-error" class="field-error" hidden></p>
      <button id="btn-login" class="teacher-button" type="button">Access Portal</button>
    </section>

    <section id="dashboard-section" class="teacher-dashboard" hidden>
      <div class="teacher-toolbar">
        <div>
          <p class="eyebrow admin-eyebrow">Curriculum control</p>
          <h1>Practice Builder</h1>
        </div>
        <button id="btn-logout" class="secondary-button" type="button">Logout</button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="add-challenge" type="button">Create Practice</button>
        <button class="tab-btn" data-tab="view-challenges" type="button">Practice Library</button>
      </div>

      <section id="tab-add-challenge" class="tab-panel teacher-panel">
        <h2>Create a Question</h2>
        <div class="form-grid">
          <label>Level
            <select id="input-level">
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </label>
          <label>Difficulty
            <select id="input-difficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <label>Category
            <select id="input-category">
              <option value="Table Exploration">Table Exploration</option>
              <option value="Sorting and Limiting">Sorting and Limiting</option>
              <option value="Filtering">Filtering</option>
              <option value="Scalar Functions">Scalar Functions</option>
              <option value="Aggregate Functions">Aggregate Functions</option>
              <option value="Joins">Joins</option>
              <option value="Group By">Group By</option>
              <option value="Subqueries">Subqueries</option>
              <option value="Correlated Subqueries">Correlated Subqueries</option>
            </select>
          </label>
        </div>
        <label>Question text
          <textarea id="input-question" rows="3" placeholder="Ask a clear, student-friendly SQL question."></textarea>
        </label>
        <label>Expected SQL solution
          <textarea id="input-expected-sql" rows="5" class="code-input" placeholder="SELECT ..."></textarea>
        </label>
        <label>Hint
          <input id="input-hint" type="text" placeholder="Give a useful nudge without giving away the whole answer.">
        </label>
        <div class="button-row">
          <button id="btn-save-challenge" class="teacher-button" type="button">Save Practice</button>
          <button id="btn-clear-form" class="secondary-button" type="button">Clear</button>
        </div>
        <p id="save-feedback" class="form-message" hidden></p>
      </section>

      <section id="tab-view-challenges" class="tab-panel teacher-panel" hidden>
        <div class="library-toolbar">
          <h2>Practice Library</h2>
          <div class="filters">
            <select id="filter-level">
              <option value="">All Levels</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
            <select id="filter-category">
              <option value="">All Categories</option>
            </select>
            <select id="filter-difficulty">
              <option value="">All Difficulties</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button id="btn-refresh-challenges" class="secondary-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="challenges-list" class="mission-list"></div>
      </section>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
